<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skurðarlisti (Cutty) — Björninn</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    padding: 24px 40px 60px;
  }
  h1 { font-size: 1.4rem; letter-spacing: 0.03em; margin-bottom: 4px; }
  .sub { color: #888; font-size: 0.85rem; margin-bottom: 24px; }

  .card {
    background: #161616;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
  }

  label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 6px; }

  input[type="text"], input[type="number"], select {
    background: #0d0d0d;
    border: 1px solid #333;
    color: #f0f0f0;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.95rem;
    width: 100%;
    max-width: 420px;
  }

  button {
    background: #2196f3;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
  }
  button:disabled { background: #333; color: #777; cursor: not-allowed; }
  button.secondary { background: #333; }

  #searchResults { margin-top: 10px; max-width: 420px; }
  .result-item {
    padding: 8px 10px;
    border: 1px solid #222;
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .result-item:hover { border-color: #2196f3; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #222; }
  th { color: #999; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }

  .status-ok { color: #4caf50; font-weight: 600; }
  .status-warn { color: #f44336; font-weight: 600; }

  #log {
    background: #0d0d0d;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 12px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 0.8rem;
    max-height: 260px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: #9ad39a;
  }

  .project-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
  .hidden { display: none; }
</style>
</head>
<body>

  <h1>Skurðarlisti fyrir Cutty</h1>
  <div class="sub">Býr til CUTLST-skrár beint á USB-drif, flokkað eftir efni og þykkt.</div>

  <div class="card" id="searchCard">
    <label>Veldu verkefni (Tækifæri)</label>
    <select id="projectSelect">
      <option value="">Sæki verkefni…</option>
    </select>
  </div>

  <div class="card hidden" id="projectCard">
    <div class="project-name" id="projectName"></div>
    <div class="sub" id="projectStatus">Sæki Sögunarlisti færslur…</div>
  </div>

  <div class="card hidden" id="missingDimsCard">
    <label>Línur vantar breidd/þykkt — líklega ekki skurðarpartar (t.d. Blum vélbúnaður)</label>
    <ul id="missingDimsList" style="font-size:0.85rem;color:#f5c518;padding-left:20px;"></ul>
  </div>

  <div class="card hidden" id="oversizedCard">
    <label>Passa ekki á plötuna — verður að leysa áður en hægt er að skrifa á USB</label>
    <ul id="oversizedList" style="font-size:0.85rem;color:#f44336;padding-left:20px;list-style:none;"></ul>
  </div>

  <div class="card hidden" id="groupsCard">
    <table id="groupsTable">
      <thead>
        <tr>
          <th>Efni</th>
          <th>Þykkt</th>
          <th>Plötustærð</th>
          <th>Fjöldi lína</th>
          <th>Fjöldi skráa</th>
          <th>Staða</th>
        </tr>
      </thead>
      <tbody id="groupsBody"></tbody>
    </table>

    <label style="margin-top:16px;">Fjöldi platna á skrá (F1 — hægt að breyta í Cutty á gólfinu)</label>
    <input type="number" id="boardQtyInput" value="1" min="1" style="max-width:120px;" />

    <div>
      <button id="writeBtn">Velja USB-drif og skrifa skurðarlista</button>
      <button class="secondary" id="resetBtn">Byrja upp á nýtt</button>
    </div>
  </div>

  <div class="card hidden" id="logCard">
    <label>Log</label>
    <div id="log"></div>
  </div>

<script>
// ── CONFIGURATION ────────────────────────────────────────────────────────
// Requests go through /api/airtable — a server-side proxy that holds the
// Personal Access Token as a Vercel env var. Never embed the token here:
// GitHub's push protection blocks any commit containing an Airtable PAT.
const PROXY_URL = "/api/airtable";

// Table IDs, not names — the proxy path only needs to survive as a plain
// query-string value, and IDs avoid encoding table names with emoji.
const PROJECTS_TABLE     = "tbl4LMXlQjp66RFKI"; // Tækifæri 📣 (projects)
const SOGUNARLISTI_TABLE = "tblhdgyvTcBfP8kov"; // Sögunarlisti 🪚
const EFNISLISTI_TABLE   = "tbl8CrVWKF8CuI7HD"; // Efnislisti 🧱

const P_NAME_FIELD = "Heiti tækifæris / verkefnis";
const P_STADA_SKIPULAG = "Staða í skipulagi";
const P_STADA_FRAM = "Staða í framleiðslu";
const P_UNNID = "Tækifæri unnið 🏆";

const S_PROJECT_LINK      = "Tækifæri 📣 (projects)";
const S_PARTUR            = "Partur";
const S_H                 = "H";
const S_B                 = "B";
const S_TH                = "Þ";
const S_M                 = "M";
const S_EFNI_UNDIRSTADA   = "Efni: (undirstaða)";
const S_VILLA             = "Villa?";

const E_HEITI   = "Heiti efnis";
const E_BREIDD  = "Breidd (mm)";
const E_LENGD   = "Lengd (mm)";
const E_THYKKT  = "Þykkt (mm)";

const MAX_LINES_PER_FILE = 22;

// Case/whitespace/dash-insensitive comparison for Partur category matching —
// the fuzzy board-name matching already tolerated this, but the exact Set
// lookups below didn't: a Partur typed as "Slaglisti- Hliðar" (missing a
// space) or in different case would silently miss the override entirely and
// re-introduce the exact bug already found once, just under a new string.
function normalizePartur(s) {
  return String(s || "").trim().toLowerCase().replace(/\s+/g, " ").replace(/[–-]/g, "-");
}

// Karmur is glued/built-up (like Sérsmíði) — not a single saw cut, excluded entirely.
const EXCLUDED_PARTUR = new Set(["Sérsmíði", "Karmur – Hliðar", "Karmur – Toppstykki"].map(normalizePartur));

// "Efni: (undirstaða)" has no override for Slaglisti/Karmur, so it falls through
// to the customer's carcass-laminate lookup — which isn't a real board at these
// thicknesses. Mirror the board override your "Efni:" formula already encodes,
// keyed directly on Partur instead of trusting the formula field for these two.
const SLAGLISTI_PARTUR = new Set(["Slaglisti – Hliðar", "Slaglisti – Toppur"].map(normalizePartur));
const KJOTLISTI_PARTUR = new Set(["Kjötlisti – Hlið", "Kjötlisti – Efri / Neðri"].map(normalizePartur));

// Acronyms for the 25-char per-piece label field — long Partur text was
// silently truncated mid-word before (e.g. "Innskúffufrontur K - Merivo
// Skrokkaefni" → "Innskúffufrontur K - Meri"). Keyed by a regex matched
// against the normalized Partur text; only affects the label baked into the
// generated CUTLST file, never the real Partur value in Airtable.
const PARTUR_LABEL_OVERRIDES = [
  { pattern: /innskúffufrontur m -/,                    label: "Innskfr M-M | skrokkaefni" },
  { pattern: /innskúffufrontur e -/,                    label: "Innskfr M-E | skrokkaefni" },
  { pattern: /innskúffufrontur k -/,                    label: "Innskfr M-K | skrokkaefni" },
  { pattern: /revego duo - right- partition side/,      label: "FRE Revego hægri hlið" },
  { pattern: /toppslár/,                                label: "Toppslár | muna kantlíma" },
  { pattern: /revego duo - track cover panel/,          label: "FRE revego br. klæðning" },
  { pattern: /skúffubotn - merivo - fræsa úrtak/,       label: "Skbotn Merivo | Úrtak" },
  { pattern: /úthlið\/blindlok \(vígindi þvert/,        label: "ÚH (vígindi þvert)" },
  { pattern: /- slár \(muna/,                           label: "Lagnask slár | KL" },
  { pattern: /skúffufrontur k - merivo - jey/,          label: "Sk frontur M- K | JEY" },
  { pattern: /vænghurð\..*öfugt/,                       label: "Fr vænghurð" },
  { pattern: /revego duo - fixed shelf/,                label: "FRE revego föst hilla" },
  { pattern: /fre2 - fronta lyftu frontur/,             label: "FRE2 - Frontalyftu FR" },
  { pattern: /vasi innri hlið/,                         label: "FRE- Vasi innri hlið (H)" },
  { pattern: /lagna - skúffubotn - merivo/,              label: "Lagna - Skbotn - Merivo" },
  { pattern: /vasi ytri hlið/,                           label: "FRE- Vasi ytri hlið (H)" },
];

function resolveLabel(partur) {
  const norm = normalizePartur(partur);
  const override = PARTUR_LABEL_OVERRIDES.find(o => o.pattern.test(norm));
  return override ? override.label : partur;
}

function resolveMaterialKey(p) {
  const partur = normalizePartur(p.partur);
  if (SLAGLISTI_PARTUR.has(partur)) return "MDF 12mm";
  if (KJOTLISTI_PARTUR.has(partur)) return "Spónaplata";
  return normalizeMaterialKey(p.efni);
}

// Static blocks, byte-verified against a real saved Cutty order (CUTLST00 from the shop USB).
// Do not change unless the saw's kerf/trim configuration changes — see CUTLST_FORMAT.md.
const F7_BLOCK = [
  "F7 3052",
  "218 436", "167 669", "204 408", "204 204", "204 204",
  "209 209", "167 167", "213 213", "229 229", "164 164", "150 150",
];
const F7B_LINE = "F7b 0.000 0.000 0.000 0.000";
const F8_LINE  = "F8 0.000 0.000 20 10 0 0 0.000 -1 -1 0 1 0 1 0";
const F9_LINE  = "F9 0 0.000 0 0.000 0.000 0.000 20.000 20.000 10 0 4.400 0 0 0 2";
// ─────────────────────────────────────────────────────────────────────────

let currentProject = null;
let currentGroups = [];

function log(msg) {
  const el = document.getElementById("log");
  document.getElementById("logCard").classList.remove("hidden");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

function toNumber(v) {
  if (v === null || v === undefined) return 0;
  if (typeof v === "number") return v;
  const n = Number(String(v).replace(",", "."));
  return Number.isFinite(n) ? n : 0;
}

// Material/Partur text comes straight from Airtable and gets interpolated
// into innerHTML for the groups/warnings tables — escape it so a stray
// "<"/">" in a note field can't render as real HTML.
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function fmtNum(n) { return Number(n).toFixed(3); }

function padRight(s, width) {
  s = String(s ?? "");
  if (s.length >= width) return s.slice(0, width);
  return s + " ".repeat(width - s.length);
}

// Strips the trailing " – " artifact left by the "Efni: (undirstaða)" formula
// when the linked customer-material lookup is empty, WITHOUT touching real
// suffixes like "-harðplast" (no space before that dash).
function normalizeMaterialKey(raw) {
  return String(raw || "").trim().replace(/\s+[–-]\s*$/, "").trim();
}

function fuzzyKey(s) {
  return String(s || "").toLowerCase().replace(/\s+/g, "");
}

function sanitizeFolderName(name) {
  return String(name).replace(/[\\/:*?"<>|]/g, "-").trim();
}

// ISO-8859-1 (Latin-1) — confirmed by hex-dumping a real CUTLST file; covers
// öáéíóúýþæð natively, so no transliteration needed. Anything outside Latin-1
// (shouldn't happen — Partur text is plain Icelandic) falls back to '?'.
function stringToLatin1Bytes(str) {
  const bytes = new Uint8Array(str.length);
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i);
    bytes[i] = code <= 0xFF ? code : 0x3F;
  }
  return bytes;
}

// print-server.js already retries its own Airtable calls on 429 — this
// mirrors that here, since writeToUsb can fire dozens of sequential PATCHes
// (one per piece, for Skurðarskrá) and previously any rate-limit hit would
// just abort that single piece's write with no retry at all.
async function fetchWithRetry(url, options, maxRetries = 3) {
  for (let attempt = 0; ; attempt++) {
    const res = await fetch(url, options);
    if (res.status !== 429 || attempt >= maxRetries) return res;
    await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
  }
}

async function airtableFetch(table, params, recordId) {
  const url = new URL(PROXY_URL, window.location.origin);
  url.searchParams.set("path", recordId ? `${table}/${recordId}` : table);
  for (const [k, v] of Object.entries(params || {})) {
    if (Array.isArray(v)) v.forEach(x => url.searchParams.append(k, x));
    else if (v !== undefined) url.searchParams.set(k, v);
  }

  if (recordId) {
    const res = await fetchWithRetry(url.toString());
    if (!res.ok) throw new Error(`Airtable HTTP ${res.status}`);
    return res.json();
  }

  let records = [];
  let offset;
  do {
    if (offset) url.searchParams.set("offset", offset);
    const res = await fetchWithRetry(url.toString());
    if (!res.ok) throw new Error(`Airtable HTTP ${res.status}`);
    const data = await res.json();
    records = records.concat(data.records || []);
    offset = data.offset;
  } while (offset);
  return records;
}

// Narrow write path for the oversized-piece resolution flow (mark as manual
// cut, or fix the recorded H/B). The proxy only allows this on Sögunarlisti,
// and only on the fields listed in WRITABLE_FIELDS server-side — this client
// code can't expand that, it's enforced independently on the server.
async function patchSogunarlisti(recordId, fields) {
  const url = new URL(PROXY_URL, window.location.origin);
  url.searchParams.set("path", `${SOGUNARLISTI_TABLE}/${recordId}`);
  const res = await fetchWithRetry(url.toString(), {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ fields }),
  });
  if (!res.ok) throw new Error(`Airtable PATCH HTTP ${res.status}`);
  return res.json();
}

async function fetchEligibleProjects() {
  // Only projects that have entered Skipulag (any status in that field) or are
  // already confirmed/won — excludes early-stage leads from the dropdown.
  // Staða í framleiðslu must be empty too: once production has actually
  // started, the project no longer needs to show up here.
  const formula = `AND(
    OR(
      {${P_STADA_SKIPULAG}} != "",
      {${P_UNNID}} = 1
    ),
    {${P_STADA_FRAM}} = ""
  )`;
  return airtableFetch(PROJECTS_TABLE, {
    filterByFormula: formula,
    "fields[]": [P_NAME_FIELD],
    pageSize: 100,
  });
}

async function fetchProjectById(id) {
  return airtableFetch(PROJECTS_TABLE, {}, id);
}

// Scoped to one project server-side via the project's own name text, instead
// of pulling the whole table (1800+ rows and growing) and filtering
// client-side. Airtable can't filter a linked-record field by ID directly
// through filterByFormula, but ARRAYJOIN'd link fields return the linked
// records' primary field text, which we already have from fetchProjectById.
// The client-side .includes(projectId) check stays as a defensive backstop
// in case two projects ever share exact name text.
async function fetchSogunarlistiForProject(projectName) {
  const escaped = projectName.replace(/"/g, '\\"');
  const formula = `FIND("${escaped}", ARRAYJOIN({${S_PROJECT_LINK}})) > 0`;
  return airtableFetch(SOGUNARLISTI_TABLE, {
    filterByFormula: formula,
    "fields[]": [S_PROJECT_LINK, S_PARTUR, S_H, S_B, S_TH, S_M, S_EFNI_UNDIRSTADA, S_VILLA],
    pageSize: 100,
  });
}

async function fetchAllBoards() {
  return airtableFetch(EFNISLISTI_TABLE, {
    "fields[]": [E_HEITI, E_BREIDD, E_LENGD, E_THYKKT],
    pageSize: 100,
  });
}

// Ambiguous matches (more than one board qualifies at the same tier) are
// left unresolved (board: null) rather than silently guessing candidates[0]
// — picking "whichever Airtable returned first" with no signal is exactly
// how a wrong board gets used if two candidates ever have different
// dimensions (e.g. a second "Eurolight 38mm ..." SKU, or two veneer
// variants like "...eik" vs "...eik m gripalistum"). The caller must show
// the candidate list and let a person pick.
function findBoard(materialKey, thickness, boards) {
  const fk = fuzzyKey(materialKey);
  // Every tier requires the board's own Þykkt to match the piece's real
  // thickness — name matching alone must never bypass that check, or a
  // material sold at one thickness silently gets matched to a mislabeled
  // row claiming a different thickness (caught via live testing on T-31).
  const sameThickness = b => toNumber(b.fields[E_THYKKT]) === thickness;

  const tiers = [
    boards.filter(b => fuzzyKey(b.fields[E_HEITI]) === fk && sameThickness(b)),
    boards.filter(b => fuzzyKey(b.fields[E_HEITI]).startsWith(fk) && sameThickness(b)),
    boards.filter(b => fuzzyKey(b.fields[E_HEITI]).includes(fk) && sameThickness(b)),
  ];

  for (const candidates of tiers) {
    if (!candidates.length) continue;
    const ambiguous = candidates.length > 1;
    return { board: ambiguous ? null : candidates[0], ambiguous, candidates };
  }

  return { board: null, ambiguous: false, candidates: [] };
}

// The original CUTLST format doc is explicit that nothing stops you writing
// a piece bigger than the board — checked here instead, since a silent
// oversized piece in the file is exactly how a piece gets forgotten (it'd
// only surface once someone's standing at the saw with a file that doesn't
// nest). Allows either orientation (grain-direction locking isn't checked —
// out of scope today, would need the "Vígindi" field too).
function pieceFits(p, board) {
  const boardL = toNumber(board.fields[E_LENGD]);
  const boardW = toNumber(board.fields[E_BREIDD]);
  const fitsAsIs = p.h <= boardL && p.b <= boardW;
  const fitsRotated = p.b <= boardL && p.h <= boardW;
  return fitsAsIs || fitsRotated;
}

function groupPieces(pieces) {
  const groups = new Map();
  const missingDims = [];
  for (const p of pieces) {
    if (EXCLUDED_PARTUR.has(normalizePartur(p.partur))) continue;
    // A real saw panel always has width+thickness. Rows missing either are
    // usually pre-made hardware (e.g. Blum TIP-ON units) that slipped into
    // Sögunarlisti as raw untranslated import text — not something to cut.
    if (p.b <= 0 || p.th <= 0) { missingDims.push(p); continue; }
    const mat = resolveMaterialKey(p);
    const key = `${mat}|${p.th}`;
    if (!groups.has(key)) groups.set(key, { material: mat, thickness: p.th, rows: [] });
    groups.get(key).rows.push(p);
  }
  return { groups, missingDims };
}

// Greedy LPT (longest-processing-time-first) bin balancing: place the largest
// piece first, always into whichever file currently has the least total area
// (among files still under the line cap). Round-robin-by-rank looked balanced
// but actually left a ~2x spread in cut area per file on real data (9.8m² vs
// 20.4m² across 8 files of the same material) — this keeps files within ~1m²
// of each other, so no board load is left mostly empty while another is
// packed tight.
function packIntoFiles(rows, maxLines) {
  const n = Math.max(1, Math.ceil(rows.length / maxLines));
  if (n === 1) return [rows];
  const sorted = [...rows].sort((a, b) => (b.h * b.b) - (a.h * a.b));
  const bins = Array.from({ length: n }, () => ({ rows: [], area: 0 }));
  for (const p of sorted) {
    const candidates = bins.filter(b => b.rows.length < maxLines);
    const target = candidates.reduce((min, b) => (b.area < min.area ? b : min), candidates[0]);
    target.rows.push(p);
    target.area += p.h * p.b * p.m;
  }
  return bins.map(b => b.rows);
}

function buildPieceLine(length, width, qty, pieceNum, description) {
  const piecenumField = padRight(String(pieceNum), 13);
  const descField = padRight(description, 25);
  return `${fmtNum(length)} ${fmtNum(width)} ${qty} 0 0 0 0 ${piecenumField}0 ${descField}`;
}

function buildCutlstContent(boardLength, boardWidth, thickness, boardQty, pieces) {
  const lines = [];
  lines.push("F0" + " ".repeat(26));
  lines.push(" 6.00 210700 150300");
  lines.push("");
  lines.push(`F1 ${fmtNum(thickness)} 0.000 0.000 0.000 `);
  lines.push(
    `${fmtNum(boardLength)} ${fmtNum(boardWidth)} ${boardQty} 200 1 1` +
    " ".repeat(21) + "EdtDescrizione" + " ".repeat(12) + "0 1.000"
  );
  lines.push("");
  lines.push("F2 0 0 0");
  pieces.forEach((p, i) => {
    lines.push(buildPieceLine(p.h, p.b, p.m, i + 1, p.label));
  });
  lines.push("");
  lines.push(...F7_BLOCK);
  lines.push("");
  lines.push(F7B_LINE);
  lines.push("");
  lines.push(F8_LINE);
  lines.push("");
  lines.push(F9_LINE);
  lines.push("");
  lines.push("F3");
  lines.push("E0");
  return lines.join("\r\n") + "\r\n";
}

let currentOversized = [];

// Splits a group's full row set against its (possibly just-chosen) board:
// fitting pieces stay in the group, oversized ones move to currentOversized.
// Re-runnable so picking a board for a previously-ambiguous group recomputes
// oversized/files the same way the initial load does. If no board is set yet
// (still ambiguous, unresolved), files are still built from the full row set
// so the table shows a file-count estimate, but writeToUsb() skips groups
// without a board regardless.
function applyBoardToGroup(g) {
  currentOversized = currentOversized.filter(o => o.groupKey !== g.key);
  let rows = g.allRows;
  if (g.board) {
    const fitting = [];
    for (const p of g.allRows) {
      if (pieceFits(p, g.board)) fitting.push(p);
      else currentOversized.push({ ...p, material: g.material, thickness: g.thickness, board: g.board, groupKey: g.key });
    }
    rows = fitting;
  }
  g.rows = rows;
  g.files = packIntoFiles(rows, MAX_LINES_PER_FILE);
}

// Called from the board-picker <select> in renderGroups() when a group's
// match was ambiguous — resolves it to the chosen candidate and recomputes
// everything downstream (oversized check, file split) for that group.
function chooseBoardForGroup(groupKey, boardId) {
  const g = currentGroups.find(x => x.key === groupKey);
  if (!g || !boardId) return;
  const chosen = g.candidates.find(c => c.id === boardId);
  if (!chosen) return;
  g.board = chosen;
  applyBoardToGroup(g);
  renderOversized();
  renderGroups();
  updateWriteButtonState();
}

async function loadProject(projectId) {
  document.getElementById("searchCard").classList.add("hidden");
  document.getElementById("projectCard").classList.remove("hidden");
  document.getElementById("projectStatus").textContent = "Sæki gögn…";

  const project = await fetchProjectById(projectId);
  currentProject = project;
  const projectName = project.fields[P_NAME_FIELD] || project.id;
  document.getElementById("projectName").textContent = projectName;

  const [rows, boards] = await Promise.all([
    fetchSogunarlistiForProject(projectName),
    fetchAllBoards(),
  ]);

  const allRows = rows
    .filter(r => (r.fields[S_PROJECT_LINK] || []).includes(projectId)) // defensive backstop, see fetchSogunarlistiForProject
    .map(r => ({
      id: r.id,
      partur: r.fields[S_PARTUR] || "",
      h: toNumber(r.fields[S_H]),
      b: toNumber(r.fields[S_B]),
      th: toNumber(r.fields[S_TH]),
      m: toNumber(r.fields[S_M]) || 1,
      efni: r.fields[S_EFNI_UNDIRSTADA] || "",
      label: resolveLabel(String(r.fields[S_PARTUR] || "").trim()),
      villa: !!r.fields[S_VILLA],
    }));

  // Already marked "handskorið" via markOversizedManual() on a previous run —
  // permanently excluded, not re-flagged every time (the H/B are still
  // oversized, that's the whole point, so pieceFits() would flag it forever
  // otherwise).
  const manualCount = allRows.filter(p => p.villa).length;
  const pieces = allRows.filter(p => !p.villa);

  if (!pieces.length) {
    document.getElementById("projectStatus").textContent =
      "Engar Sögunarlisti færslur fundust fyrir þetta verkefni.";
    return;
  }

  const { groups: groupMap, missingDims } = groupPieces(pieces);
  currentGroups = [];
  currentOversized = [];
  let i = 0;
  for (const g of groupMap.values()) {
    const { board, ambiguous, candidates } = findBoard(g.material, g.thickness, boards);
    const groupObj = { ...g, key: String(i++), allRows: g.rows, board, ambiguous, candidates, rows: [], files: [] };
    currentGroups.push(groupObj);
    applyBoardToGroup(groupObj);
  }

  const groupedCount = [...groupMap.values()].reduce((s, g) => s + g.rows.length, 0);
  const sersmidiCount = pieces.length - groupedCount - missingDims.length;
  document.getElementById("projectStatus").textContent =
    `${allRows.length} línur sóttar` +
    (manualCount ? `, ${manualCount} þegar merktar handskornar` : "") +
    (sersmidiCount ? `, ${sersmidiCount} Sérsmíði/Karmur-línur sleppt` : "") +
    (missingDims.length ? `, ${missingDims.length} línur vantar mál (líklega ekki skurðarpartar)` : "") +
    `, ${currentGroups.length} efni/þykktar-hópar fundnir.` +
    (currentOversized.length ? ` ⚠ ${currentOversized.length} passa ekki á plötu.` : "");

  renderMissingDims(missingDims);
  renderOversized();
  renderGroups();
  document.getElementById("groupsCard").classList.remove("hidden");
}

function renderMissingDims(missingDims) {
  const card = document.getElementById("missingDimsCard");
  const list = document.getElementById("missingDimsList");
  if (!missingDims.length) {
    card.classList.add("hidden");
    return;
  }
  list.innerHTML = missingDims
    .map(p => `<li>${escapeHtml(p.label || "(án Partur)")} — H:${p.h} B:${p.b} Þ:${p.th}</li>`)
    .join("");
  card.classList.remove("hidden");
}

function renderGroups() {
  const tbody = document.getElementById("groupsBody");
  tbody.innerHTML = "";
  for (const g of currentGroups) {
    const tr = document.createElement("tr");
    const boardSize = g.board
      ? `${g.board.fields[E_LENGD]}×${g.board.fields[E_BREIDD]}mm`
      : "—";
    let statusHtml;
    if (g.ambiguous && !g.board) {
      // Unresolved — more than one Efnislisti board could match. Blocking
      // (see updateWriteButtonState) rather than silently guessing, since
      // the candidates can have different real dimensions.
      const options = g.candidates
        .map(c => `<option value="${c.id}">${escapeHtml(c.fields[E_HEITI])} (${c.fields[E_LENGD]}×${c.fields[E_BREIDD]}mm)</option>`)
        .join("");
      statusHtml = `
        <span class="status-warn">Veldu plötu:</span>
        <select onchange="chooseBoardForGroup('${g.key}', this.value)" style="max-width:280px;">
          <option value="">— Fleiri en ein plata gæti passað —</option>
          ${options}
        </select>
      `;
    } else if (!g.board) {
      statusHtml = `<span class="status-warn">Engin plata fannst — athuga Efnislisti</span>`;
    } else if (g.ambiguous) {
      statusHtml = `<span class="status-ok">Fann plötu (valið handvirkt)</span>`;
    } else {
      statusHtml = `<span class="status-ok">Fann plötu</span>`;
    }
    tr.innerHTML = `
      <td>${escapeHtml(g.material)}</td>
      <td>${g.thickness}mm</td>
      <td>${boardSize}</td>
      <td>${g.rows.length}</td>
      <td>${g.files.length}</td>
      <td>${statusHtml}</td>
    `;
    tbody.appendChild(tr);
  }
}

// Blocking by design — an oversized piece that's silently skipped is a piece
// that never gets cut. Each one must be either fixed (corrected H/B saved
// back to Sögunarlisti and re-included) or explicitly marked for manual
// cutting (Villa? + a note, excluded from this run) before the USB write is
// allowed to proceed.
function renderOversized() {
  const card = document.getElementById("oversizedCard");
  const list = document.getElementById("oversizedList");
  list.innerHTML = "";
  if (!currentOversized.length) {
    card.classList.add("hidden");
    updateWriteButtonState();
    return;
  }
  card.classList.remove("hidden");
  currentOversized.forEach((p, idx) => {
    const li = document.createElement("li");
    li.style.marginBottom = "10px";
    li.innerHTML = `
      ${escapeHtml(p.label)} — <strong>${p.h}×${p.b}mm</strong> á ${p.thickness}mm ${escapeHtml(p.material)}
      (plata ${p.board.fields[E_LENGD]}×${p.board.fields[E_BREIDD]}mm)<br>
      <input type="number" value="${p.h}" id="fixH-${idx}" style="width:90px;max-width:90px;display:inline-block;" />
      ×
      <input type="number" value="${p.b}" id="fixB-${idx}" style="width:90px;max-width:90px;display:inline-block;" />
      mm
      <button class="secondary" style="margin-top:0;" onclick="fixOversized(${idx})">Leiðrétta og vista</button>
      <button class="secondary" style="margin-top:0;" onclick="markOversizedManual(${idx})">Merkja sem handskorið</button>
    `;
    list.appendChild(li);
  });
  updateWriteButtonState();
}

function updateWriteButtonState() {
  const unresolvedAmbiguous = currentGroups.some(g => g.ambiguous && !g.board);
  document.getElementById("writeBtn").disabled = currentOversized.length > 0 || unresolvedAmbiguous;
}

async function fixOversized(idx) {
  const p = currentOversized[idx];
  const newH = toNumber(document.getElementById(`fixH-${idx}`).value);
  const newB = toNumber(document.getElementById(`fixB-${idx}`).value);
  if (newH <= 0 || newB <= 0) { alert("Sláðu inn gild mál."); return; }
  await patchSogunarlisti(p.id, { [S_H]: newH, [S_B]: newB });
  log(`Leiðrétt í Airtable: ${p.label} → ${newH}×${newB}mm. Endurhleð verkefni…`);
  await loadProject(currentProject.id);
}

async function markOversizedManual(idx) {
  const p = currentOversized[idx];
  await patchSogunarlisti(p.id, {
    "Villa?": true,
    "Athugasemd": `Passar ekki á plötu (${p.h}×${p.b}mm á ${p.board.fields[E_LENGD]}×${p.board.fields[E_BREIDD]}mm) — skorið handvirkt, ekki í Cutty-skurðarlista.`,
  });
  log(`Merkt sem handskorið í Airtable: ${p.label}. Endurhleð verkefni…`);
  await loadProject(currentProject.id);
}

async function writeToUsb() {
  if (!("showDirectoryPicker" in window)) {
    alert("Þessi vafri styður ekki að skrifa beint á USB. Notaðu Chrome eða Edge.");
    return;
  }
  const writeBtn = document.getElementById("writeBtn");
  writeBtn.disabled = true; // guards against double-clicks starting two overlapping writes

  const boardQty = Math.max(1, parseInt(document.getElementById("boardQtyInput").value, 10) || 1);
  const jobName = sanitizeFolderName(currentProject.fields[P_NAME_FIELD] || currentProject.id);

  let rootDir;
  try {
    rootDir = await window.showDirectoryPicker();
  } catch (e) {
    log("Hætt við að velja USB-drif.");
    updateWriteButtonState();
    return;
  }

  // "-" not "|" — USB sticks for Cutty are FAT32/exFAT, which reject "|" in
  // filenames. sanitizeFolderName() already strips "|" from jobName itself,
  // but the literal " | " joiner here was un-sanitized and silently broke
  // getDirectoryHandle() with no visible error (caught via real USB testing).
  const jobDirName = sanitizeFolderName(`${jobName} - Sögunarlisti`);

  try {
    // Wipe any previous run for this project before writing fresh — otherwise
    // a re-run after fixing data (e.g. an Efnislisti correction) can leave
    // stale files from the old grouping sitting alongside the new ones.
    try {
      await rootDir.getDirectoryHandle(jobDirName, { create: false });
      log(`Hreinsa eldri möppu: ${jobDirName}`);
      await rootDir.removeEntry(jobDirName, { recursive: true });
    } catch (e) {
      // didn't exist yet — nothing to wipe, proceed to create it fresh
    }

    log(`Skrifa í möppu: ${jobDirName}`);
    const jobDir = await rootDir.getDirectoryHandle(jobDirName, { create: true });

    let totalFiles = 0;
    for (const g of currentGroups) {
      if (!g.board) {
        log(`SLEPPT: ${g.material} (${g.thickness}mm) — engin plata fannst í Efnislisti.`);
        continue;
      }
      const folderName = sanitizeFolderName(`${g.thickness}mm - ${g.material}`);
      const matDir = await jobDir.getDirectoryHandle(folderName, { create: true });

      for (let i = 0; i < g.files.length; i++) {
        const content = buildCutlstContent(
          g.board.fields[E_LENGD], g.board.fields[E_BREIDD], g.thickness, boardQty, g.files[i]
        );
        // On the USB the name carries file# + material so the operator can
        // tell files apart at a glance ("CUTLST00-1-MDF 12mm"). Cutty itself
        // needs the strict "CUTLST00" 8-char form, so the operator strips the
        // "-1-MDF 12mm" suffix back off when copying one file at a time into
        // Cutty's own folder — the base stays fixed, only the suffix differs.
        const fileName = sanitizeFolderName(`CUTLST00-${i + 1}-${g.material}`);
        const fileHandle = await matDir.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(stringToLatin1Bytes(content));
        await writable.close();
        totalFiles++;
        log(`  ${folderName}/${fileName} — ${g.files[i].length} línur`);

        // Record which file each piece landed in, so Sögunarlisti can be
        // filtered by "assigned to a file" (about to be cut) vs not yet.
        for (const p of g.files[i]) {
          try {
            await patchSogunarlisti(p.id, { "Skurðarskrá": fileName });
          } catch (e) {
            log(`  ⚠ Skurðarskrá ekki vistað fyrir ${p.label}: ${e.message}`);
          }
        }
      }
    }
    log(`Búið. ${totalFiles} skrár skrifaðar á USB.`);
  } catch (e) {
    log(`VILLA: ${e.message}`);
    alert(`Villa við að skrifa á USB: ${e.message}`);
  } finally {
    updateWriteButtonState();
  }
}

async function populateProjectDropdown() {
  const select = document.getElementById("projectSelect");
  const records = await fetchEligibleProjects();
  records.sort((a, b) =>
    (a.fields[P_NAME_FIELD] || "").localeCompare(b.fields[P_NAME_FIELD] || "", "is")
  );
  select.innerHTML = '<option value="">— Veldu verkefni —</option>';
  for (const r of records) {
    const opt = document.createElement("option");
    opt.value = r.id;
    opt.textContent = r.fields[P_NAME_FIELD] || r.id;
    select.appendChild(opt);
  }
}

document.getElementById("projectSelect").addEventListener("change", (e) => {
  if (e.target.value) loadProject(e.target.value);
});

document.getElementById("writeBtn").addEventListener("click", writeToUsb);
document.getElementById("resetBtn").addEventListener("click", () => window.location.reload());

// Auto-load if opened from an Airtable button: cutlist.html?recordId=recXXXX
const params = new URLSearchParams(window.location.search);
const recordIdParam = params.get("recordId");
if (recordIdParam) {
  loadProject(recordIdParam);
} else {
  populateProjectDropdown();
}
</script>
