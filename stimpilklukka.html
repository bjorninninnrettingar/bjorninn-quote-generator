<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Stimpilklukka — Björninn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 24px;
    }

    /* Not fixed — screens now vary a lot in height (PIN pad vs. the
       employee screen's stack of buttons), and a fixed header overlapped
       taller screens once "Mínar stundir"/"Sækja um orlof" were added. */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #fff;
      text-transform: uppercase;
    }

    #brand {
      font-family: "Kumbh Sans", "Helvetica Neue", Arial, sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: 0.06em;
      color: #b5a270;
      margin-bottom: 24px;
    }

    #clock {
      font-size: 0.95rem;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .screen { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }
    .hidden { display: none !important; }

    /* ---- PIN screen ---- */
    #pin-dots { display: flex; gap: 18px; margin-bottom: 32px; }
    .dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #444; transition: background 0.1s, border-color 0.1s;
    }
    .dot.filled { background: #4caf50; border-color: #4caf50; }
    .dot.error { background: #e53935; border-color: #e53935; }

    #pin-msg { min-height: 22px; font-size: 0.95rem; color: #e53935; margin-bottom: 12px; text-align: center; }

    .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; }
    .pad button {
      font-size: 1.6rem;
      font-weight: 600;
      background: #161616;
      border: 1px solid #262626;
      border-radius: 14px;
      color: #f0f0f0;
      padding: 22px 0;
      font-variant-numeric: tabular-nums;
    }
    .pad button:active { background: #262626; }
    .pad button.wide { font-size: 1rem; color: #fff; }

    /* ---- Employee screen ---- */
    #employee-name { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; text-align: center; }
    #employee-status { font-size: 1rem; color: #fff; margin-bottom: 36px; text-align: center; }
    #employee-status .in { color: #4caf50; }
    #employee-status .out { color: #e53935; }

    #btn-action {
      width: 100%;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border-radius: 16px;
      padding: 34px 0;
      border: none;
      color: #fff;
    }
    #btn-action.in { background: #2e7d32; }
    #btn-action.in:active { background: #1b5e20; }
    #btn-action.out { background: #b71c1c; }
    #btn-action.out:active { background: #7f1010; }
    #btn-action:disabled { opacity: 0.4; }

    .secondary-btn {
      margin-top: 12px;
      width: 100%;
      background: none;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      padding: 14px 0;
    }
    .secondary-btn:active { background: #161616; }
    .secondary-btn:disabled { opacity: 0.4; }
    #btn-sick { margin-top: 18px; }

    .link-btn {
      margin-top: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      padding: 10px;
    }

    /* ---- Confirm screen ---- */
    #confirm-icon { font-size: 3.5rem; margin-bottom: 12px; }
    #confirm-text { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
    #confirm-time { font-size: 1rem; color: #fff; }

    /* ---- Hours screen ---- */
    #hours-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; text-align: center; }
    .stat-row {
      display: flex; justify-content: space-between; align-items: baseline;
      width: 100%; padding: 14px 0; border-bottom: 1px solid #222;
    }
    .stat-row .label { color: #ccc; font-size: 1rem; }
    .stat-row .value { font-size: 1.3rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    #hours-note { font-size: 0.85rem; color: #888; margin-top: 16px; text-align: center; }

    /* ---- Vacation request screen ---- */
    #vacation-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; text-align: center; }
    .field { width: 100%; margin-bottom: 16px; }
    .field label { display: block; font-size: 0.9rem; color: #ccc; margin-bottom: 6px; }
    .field input[type="date"] {
      width: 100%; background: #161616; color: #fff; border: 1px solid #333;
      border-radius: 10px; padding: 14px; font-size: 1.1rem; color-scheme: dark;
    }
    #btn-vacation-submit {
      width: 100%; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.03em;
      border-radius: 16px; padding: 24px 0; border: none; color: #fff;
      background: #2e7d32; margin-top: 8px;
    }
    #btn-vacation-submit:active { background: #1b5e20; }
    #btn-vacation-submit:disabled { opacity: 0.4; }
    #vacation-msg { min-height: 20px; font-size: 0.9rem; color: #e53935; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Stimpilklukka</h1>
    <div id="clock"></div>
  </header>

  <!-- PIN entry -->
  <div class="screen" id="screen-pin">
    <div id="brand">BJÖRNINN</div>
    <div id="pin-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div id="pin-msg"></div>
    <div class="pad">
      <button data-d="1">1</button><button data-d="2">2</button><button data-d="3">3</button>
      <button data-d="4">4</button><button data-d="5">5</button><button data-d="6">6</button>
      <button data-d="7">7</button><button data-d="8">8</button><button data-d="9">9</button>
      <button class="wide" id="clear-btn">Hreinsa</button><button data-d="0">0</button><button class="wide" id="back-btn">⌫</button>
    </div>
  </div>

  <!-- Employee confirm-action screen -->
  <div class="screen hidden" id="screen-employee">
    <div id="employee-name"></div>
    <div id="employee-status"></div>
    <button id="btn-action"></button>
    <button id="btn-sick" class="secondary-btn">Tilkynna veikindi í dag</button>
    <button id="btn-hours" class="secondary-btn">Mínar stundir</button>
    <button id="btn-vacation" class="secondary-btn">Sækja um orlof</button>
    <button id="cancel-btn" class="link-btn">Hætta við</button>
  </div>

  <!-- Hours screen -->
  <div class="screen hidden" id="screen-hours">
    <div id="hours-title">Mínar stundir — <span id="hours-month"></span></div>
    <div class="stat-row"><span class="label">Dagvinna</span><span class="value" id="hours-dagvinna"></span></div>
    <div class="stat-row"><span class="label">Yfirvinna</span><span class="value" id="hours-yfirvinna"></span></div>
    <div class="stat-row"><span class="label">Samtals</span><span class="value" id="hours-samtals"></span></div>
    <div class="stat-row"><span class="label">Veikindadagar</span><span class="value" id="hours-veikindi"></span></div>
    <div class="stat-row"><span class="label">Auka orlofsdagar</span><span class="value" id="hours-orlof"></span></div>
    <div id="hours-note"></div>
    <button id="hours-back" class="link-btn">Til baka</button>
  </div>

  <!-- Vacation request screen -->
  <div class="screen hidden" id="screen-vacation">
    <div id="vacation-title">Sækja um orlof</div>
    <div class="field">
      <label for="vacation-from">Frá</label>
      <input type="date" id="vacation-from" />
    </div>
    <div class="field">
      <label for="vacation-to">Til</label>
      <input type="date" id="vacation-to" />
    </div>
    <button id="btn-vacation-submit">Senda beiðni</button>
    <div id="vacation-msg"></div>
    <button id="vacation-back" class="link-btn">Hætta við</button>
  </div>

  <!-- Confirmation -->
  <div class="screen hidden" id="screen-confirm">
    <div id="confirm-icon"></div>
    <div id="confirm-text"></div>
    <div id="confirm-time"></div>
  </div>

  <script>
    const STARFSMENN_TABLE = "tblhglpjQkczdG1AY";
    const STIMPLANIR_TABLE = "tblnFIO8RB6HcelXF";
    const FJARVISTIR_TABLE = "tbl3e5o0Klv9RcNQ4";
    const ORLOFSBEIDNIR_TABLE = "tbljdg6uxEfHE7uCU";

    // Kiosk device pairing: visiting /klukka?setup=<KIOSK_DEVICE_SECRET> once
    // stores the secret in localStorage and strips it from the URL bar (so it
    // doesn't linger in history). INN/ÚT send it as a header; the server only
    // accepts those two actions from a device that has it. Sick-marking and
    // vacation requests are untouched — they still work from any device.
    (function pairKioskIfRequested() {
      const setup = new URLSearchParams(location.search).get("setup");
      if (setup) {
        localStorage.setItem("kioskToken", setup);
        history.replaceState(null, "", location.pathname);
      }
    })();
    const KIOSK_TOKEN = localStorage.getItem("kioskToken") || "";

    function todayISO(d) {
      d = d || new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    // Hardcoded rather than toLocaleString("is-IS", ...) — some browser
    // environments silently fall back to English weekday/month names when
    // their ICU data doesn't include Icelandic, with no error to catch.
    const IS_WEEKDAYS = ["Sunnudagur", "Mánudagur", "Þriðjudagur", "Miðvikudagur", "Fimmtudagur", "Föstudagur", "Laugardagur"];
    const IS_MONTHS = ["janúar", "febrúar", "mars", "apríl", "maí", "júní", "júlí", "ágúst", "september", "október", "nóvember", "desember"];

    function updateClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      document.getElementById("clock").textContent =
        `${IS_WEEKDAYS[d.getDay()]} ${d.getDate()}. ${IS_MONTHS[d.getMonth()]} kl. ${hh}:${mm}`;
    }
    updateClock();
    setInterval(updateClock, 10_000);

    async function airtableGet(path, params) {
      // Built by hand with encodeURIComponent (not URLSearchParams, which
      // encodes spaces as "+" — the incoming query parser here doesn't
      // decode "+" back to space, so a filterByFormula referencing a field
      // name with a space would silently corrupt into a literal "+").
      const all = { path, ...(params || {}) };
      const qs = Object.entries(all)
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join("&");
      const res = await fetch(`/api/airtable?${qs}`);
      if (!res.ok) throw new Error("Airtable GET failed: " + res.status);
      return res.json();
    }

    async function airtableWrite(method, path, fields, extraHeaders) {
      const url = new URL("/api/airtable", location.origin);
      url.searchParams.set("path", path);
      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json", ...(extraHeaders || {}) },
        body: JSON.stringify({ fields }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        const err = new Error(`Airtable ${method} failed: ${res.status}`);
        err.code = body.error;
        throw err;
      }
      return res.json();
    }

    async function airtablePost(path, fields, extraHeaders) {
      return airtableWrite("POST", path, fields, extraHeaders);
    }

    async function airtablePatch(path, fields, extraHeaders) {
      return airtableWrite("PATCH", path, fields, extraHeaders);
    }

    // ---- PIN screen ----
    const screenPin = document.getElementById("screen-pin");
    const screenEmployee = document.getElementById("screen-employee");
    const screenConfirm = document.getElementById("screen-confirm");
    const dots = [...document.querySelectorAll(".dot")];
    const pinMsg = document.getElementById("pin-msg");

    let pin = "";
    let locked = false; // true while looking up / submitting, ignore taps

    function renderDots(state) {
      dots.forEach((dot, i) => {
        dot.className = "dot";
        if (i < pin.length) dot.classList.add(state === "error" ? "error" : "filled");
      });
    }

    function resetPin() {
      pin = "";
      pinMsg.textContent = "";
      renderDots();
    }

    async function submitPin() {
      locked = true;
      try {
        const formula = `AND({PIN 🔢}=${pin},{Er starfandi? ✅}=1)`;
        const data = await airtableGet(STARFSMENN_TABLE, { filterByFormula: formula, maxRecords: 1 });
        const record = (data.records || [])[0];
        if (!record) {
          pinMsg.textContent = "Rangt PIN númer";
          renderDots("error");
          setTimeout(() => { locked = false; resetPin(); }, 900);
          return;
        }
        await showEmployee(record);
        locked = false;
      } catch (err) {
        pinMsg.textContent = "Villa — reyndu aftur";
        renderDots("error");
        setTimeout(() => { locked = false; resetPin(); }, 1200);
      }
    }

    document.querySelectorAll(".pad button[data-d]").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (locked || pin.length >= 4) return;
        pin += btn.dataset.d;
        renderDots();
        if (pin.length === 4) submitPin();
      });
    });
    document.getElementById("back-btn").addEventListener("click", () => {
      if (locked) return;
      pin = pin.slice(0, -1);
      pinMsg.textContent = "";
      renderDots();
    });
    document.getElementById("clear-btn").addEventListener("click", () => {
      if (locked) return;
      resetPin();
    });

    // ---- Employee screen ----
    // A row in Stimplanir is one full shift (Inn + Út on the same record).
    // "Currently clocked in" means there's a row for this employee with Inn
    // set and Út still blank — INN opens a new row, ÚT closes that open one.
    const employeeName = document.getElementById("employee-name");
    const employeeStatus = document.getElementById("employee-status");
    const btnAction = document.getElementById("btn-action");
    const btnSick = document.getElementById("btn-sick");
    let currentEmployee = null;
    let openShift = null; // the open Stimplanir record, or null if clocked out
    let sickToday = false; // already marked sick today?
    let isKK = true; // karlkyn/kvenkyn — defaults to KK (masculine) if "Kyn" isn't set

    async function showEmployee(record) {
      currentEmployee = record;
      openShift = null;
      sickToday = false;
      isKK = record.fields["Kyn"] !== "KVK";
      employeeName.textContent = record.fields["Nafn starfsmanns 👷"] || "Starfsmaður";
      employeeStatus.textContent = "Athuga stöðu…";
      btnAction.disabled = true;
      btnAction.textContent = "…";
      btnSick.disabled = true;
      screenPin.classList.add("hidden");
      screenEmployee.classList.remove("hidden");

      try {
        // A linked-record field, referenced in a formula, resolves to the
        // linked row's *display name* — not its record ID — so matching has
        // to be done against the employee's name, not record.id.
        const name = (record.fields["Nafn starfsmanns 👷"] || "").replace(/"/g, '\\"');
        const [shiftData, sickData] = await Promise.all([
          airtableGet(STIMPLANIR_TABLE, {
            filterByFormula: `AND({Starfsmaður}="${name}",{Út}=BLANK())`,
            maxRecords: 1,
          }),
          airtableGet(FJARVISTIR_TABLE, {
            // {Dagsetning} is a "date" field — comparing it to a plain string
            // with "=" silently matches nothing; DATETIME_FORMAT works.
            filterByFormula: `AND({Starfsmaður}="${name}",DATETIME_FORMAT({Dagsetning},'YYYY-MM-DD')="${todayISO()}")`,
            maxRecords: 1,
          }),
        ]);
        openShift = (shiftData.records || [])[0] || null;
        sickToday = (sickData.records || []).length > 0;
      } catch {
        employeeStatus.textContent = "Villa við að athuga stöðu";
      }
      renderAction();
    }

    function renderAction() {
      btnAction.disabled = false;
      btnSick.disabled = sickToday;
      btnSick.textContent = sickToday
        ? (isKK ? "Þegar skráður veikur í dag" : "Þegar skráð veik í dag")
        : "Tilkynna veikindi í dag";
      if (sickToday) {
        employeeStatus.innerHTML = `<span class="out">${isKK ? "Skráður veikur" : "Skráð veik"}</span> í dag`;
      } else if (openShift) {
        const time = new Date(openShift.fields["Inn"]).toLocaleTimeString("is-IS", { hour: "2-digit", minute: "2-digit" });
        employeeStatus.innerHTML = `<span class="in">${isKK ? "Mættur" : "Mætt"}</span> kl. ${time}`;
      } else {
        employeeStatus.textContent = isKK ? "Ekki mættur núna" : "Ekki mætt núna";
      }
      if (openShift) {
        btnAction.textContent = "ÚT";
        btnAction.className = "out";
      } else {
        btnAction.textContent = "INN";
        btnAction.className = "in";
      }
    }

    async function punchAction() {
      if (!currentEmployee) return;
      btnAction.disabled = true;
      const now = new Date();
      const kioskHeaders = { "X-Kiosk-Token": KIOSK_TOKEN };
      try {
        if (openShift) {
          await airtablePatch(`${STIMPLANIR_TABLE}/${openShift.id}`, { "Út": now.toISOString() }, kioskHeaders);
          showConfirm("Út", now);
        } else {
          await airtablePost(STIMPLANIR_TABLE, {
            "Inn": now.toISOString(),
            "Starfsmaður": [currentEmployee.id],
            // Real single-select fields (not formulas) so they work as a
            // clean pick-a-value dropdown filter in Interfaces — no
            // Airtable Automation sets these, so the kiosk does it here.
            "Mánuður 🗓️": IS_MONTHS[now.getMonth()],
            "Ár 🗓️": String(now.getFullYear()),
          }, kioskHeaders);
          showConfirm("Inn", now);
        }
      } catch (err) {
        employeeStatus.textContent = err.code === "DEVICE_NOT_PAIRED"
          ? "Þetta tæki er ekki skráð sem stimpilklukka — biddu yfirmann að opna uppsetningarhlekk hér"
          : "Villa við að skrá stimplun — reyndu aftur";
        btnAction.disabled = false;
      }
    }
    btnAction.addEventListener("click", punchAction);

    async function markSick() {
      // Sick leave registration doesn't require clocking in, and works from
      // any device (unlike INN/ÚT, this isn't kiosk-token gated).
      if (!currentEmployee || sickToday) return;
      btnAction.disabled = true;
      btnSick.disabled = true;
      try {
        await airtablePost(FJARVISTIR_TABLE, {
          "Dagsetning": todayISO(),
          "Starfsmaður": [currentEmployee.id],
          "Tegund": "Veikindi",
        });
        if (openShift) {
          // Best-effort: closing the shift is a Stimplanir write, so it only
          // succeeds from the paired kiosk device. Marking sick from home
          // (no token) still works — the open shift just stays open for the
          // manager to close manually.
          try {
            await airtablePatch(`${STIMPLANIR_TABLE}/${openShift.id}`, { "Út": new Date().toISOString() }, { "X-Kiosk-Token": KIOSK_TOKEN });
          } catch { /* not on the paired device — fine, see above */ }
        }
        showConfirm("Veikindi", new Date());
      } catch {
        employeeStatus.textContent = "Villa við að skrá veikindi — reyndu aftur";
        btnAction.disabled = false;
        btnSick.disabled = false;
      }
    }
    btnSick.addEventListener("click", markSick);

    document.getElementById("cancel-btn").addEventListener("click", () => {
      currentEmployee = null;
      openShift = null;
      sickToday = false;
      screenEmployee.classList.add("hidden");
      screenPin.classList.remove("hidden");
      resetPin();
    });

    // ---- Hours screen ----
    const screenHours = document.getElementById("screen-hours");
    const btnHours = document.getElementById("btn-hours");

    async function showHours() {
      screenEmployee.classList.add("hidden");
      screenHours.classList.remove("hidden");
      const now = new Date();
      document.getElementById("hours-month").textContent = IS_MONTHS[now.getMonth()];
      document.getElementById("hours-dagvinna").textContent = "…";
      document.getElementById("hours-yfirvinna").textContent = "…";
      document.getElementById("hours-samtals").textContent = "…";
      document.getElementById("hours-veikindi").textContent = "…";
      document.getElementById("hours-orlof").textContent = `${currentEmployee.fields["Auka orlofsdagar 🌴"] || 0} d.`;
      document.getElementById("hours-note").textContent = "";

      try {
        const name = (currentEmployee.fields["Nafn starfsmanns 👷"] || "").replace(/"/g, '\\"');
        const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
        const [shiftData, sickData] = await Promise.all([
          airtableGet(STIMPLANIR_TABLE, {
            filterByFormula: `AND({Starfsmaður}="${name}",DATETIME_FORMAT({Inn},'YYYY-MM')="${monthKey}",{Út}!=BLANK())`,
            pageSize: 100,
          }),
          airtableGet(FJARVISTIR_TABLE, {
            filterByFormula: `AND({Starfsmaður}="${name}",DATETIME_FORMAT({Dagsetning},'YYYY-MM')="${monthKey}")`,
            pageSize: 100,
          }),
        ]);
        const shifts = shiftData.records || [];
        const sum = (field) => shifts.reduce((total, r) => total + (r.fields[field] || 0), 0);
        document.getElementById("hours-dagvinna").textContent = `${sum("Dagvinna (klst)").toFixed(1)} klst`;
        document.getElementById("hours-yfirvinna").textContent = `${sum("Yfirvinna (klst)").toFixed(1)} klst`;
        document.getElementById("hours-samtals").textContent = `${sum("Samtals (klst)").toFixed(1)} klst`;
        document.getElementById("hours-veikindi").textContent = `${(sickData.records || []).length} d.`;
        document.getElementById("hours-note").textContent = openShift ? "Núverandi vakt er ekki talin með ennþá." : "";
      } catch {
        document.getElementById("hours-note").textContent = "Villa við að sækja stundir — reyndu aftur";
      }
    }
    btnHours.addEventListener("click", showHours);
    document.getElementById("hours-back").addEventListener("click", () => {
      screenHours.classList.add("hidden");
      screenEmployee.classList.remove("hidden");
    });

    // ---- Vacation request screen ----
    const screenVacation = document.getElementById("screen-vacation");
    const btnVacation = document.getElementById("btn-vacation");
    const vacationFrom = document.getElementById("vacation-from");
    const vacationTo = document.getElementById("vacation-to");
    const vacationMsg = document.getElementById("vacation-msg");
    const btnVacationSubmit = document.getElementById("btn-vacation-submit");

    btnVacation.addEventListener("click", () => {
      screenEmployee.classList.add("hidden");
      screenVacation.classList.remove("hidden");
      vacationMsg.textContent = "";
      vacationFrom.value = todayISO();
      vacationTo.value = todayISO();
      btnVacationSubmit.disabled = false;
    });
    document.getElementById("vacation-back").addEventListener("click", () => {
      screenVacation.classList.add("hidden");
      screenEmployee.classList.remove("hidden");
    });

    btnVacationSubmit.addEventListener("click", async () => {
      if (!currentEmployee) return;
      const fra = vacationFrom.value;
      const til = vacationTo.value;
      if (!fra || !til) {
        vacationMsg.textContent = "Veldu báðar dagsetningar";
        return;
      }
      if (til < fra) {
        vacationMsg.textContent = "Til-dagsetning verður að vera eftir frá-dagsetningu";
        return;
      }
      btnVacationSubmit.disabled = true;
      vacationMsg.textContent = "";
      try {
        // Vacation requests work from any device, like sick-marking — no
        // kiosk token. "Staða" is deliberately not sent — the server always
        // forces it to "Í bið" on create so a client can't self-approve.
        await airtablePost(ORLOFSBEIDNIR_TABLE, {
          "Frá": fra,
          "Til": til,
          "Starfsmaður": [currentEmployee.id],
        });
        screenVacation.classList.add("hidden");
        showConfirm("Orlof", new Date(), { fra, til });
      } catch {
        vacationMsg.textContent = "Villa við að senda beiðni — reyndu aftur";
        btnVacationSubmit.disabled = false;
      }
    });

    // ---- Confirm screen ----
    function showConfirm(type, when, extra) {
      screenEmployee.classList.add("hidden");
      screenVacation.classList.add("hidden");
      screenConfirm.classList.remove("hidden");
      document.getElementById("confirm-icon").textContent =
        type === "Inn" ? "✅" : type === "Veikindi" ? "🤒" : type === "Orlof" ? "🌴" : "👋";
      document.getElementById("confirm-text").textContent =
        type === "Veikindi" ? `${employeeName.textContent} ${isKK ? "skráður veikur" : "skráð veik"} í dag`
        : type === "Orlof" ? `Orlofsbeiðni send: ${extra.fra} – ${extra.til}`
        : `${employeeName.textContent} ${isKK ? "stimplaður" : "stimpluð"} ${type.toUpperCase()}`;
      document.getElementById("confirm-time").textContent =
        when.toLocaleTimeString("is-IS", { hour: "2-digit", minute: "2-digit" });

      setTimeout(() => {
        currentEmployee = null;
        openShift = null;
        sickToday = false;
        screenConfirm.classList.add("hidden");
        screenPin.classList.remove("hidden");
        resetPin();
      }, 2200);
    }
  </script>
</body>
</html>
