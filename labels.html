<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Merkingar (Sögun) — Björninn</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    padding: 24px 40px 60px;
  }
  h1 { font-size: 1.6rem; letter-spacing: 0.03em; margin-bottom: 4px; }
  .sub { color: #888; font-size: 0.95rem; margin-bottom: 24px; }

  .card {
    background: #161616;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
  }

  label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 6px; }

  select {
    background: #0d0d0d;
    border: 1px solid #333;
    color: #f0f0f0;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 1.1rem;
    width: 100%;
    max-width: 480px;
  }

  .toolbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 6px; }
  .toolbar-right { margin-left: auto; }

  .filter-pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    padding: 8px 16px; border: 1.5px solid #333; border-radius: 8px;
    user-select: none;
  }
  .filter-pill.active { border-color: #2196f3; color: #2196f3; background: #0d1a26; }
  .filter-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
  .filter-pill.active .dot { background: #2196f3; }

  button {
    background: #333;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #444; }

  .rows { display: flex; flex-direction: column; gap: 10px; }

  .row {
    display: grid;
    grid-template-columns: 1fr auto auto auto 90px;
    align-items: center;
    gap: 18px;
    background: #111;
    border: 2px solid #262626;
    border-radius: 10px;
    padding: 16px 20px;
  }
  .row.done   { border-color: #2e7d32; background: #0f1a10; opacity: 0.7; }
  .row.partial { border-color: #f5c518; background: #1a170d; }
  .row.printing { border-color: #2196f3; }

  .row-main .partur { font-size: 1.3rem; font-weight: 700; }
  .row-main .meta { color: #999; font-size: 0.95rem; margin-top: 2px; }

  .cabinets {
    color: #999; font-size: 0.9rem;
    max-width: 220px; text-align: right;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .qty-badge {
    font-size: 1.1rem; font-weight: 700;
    background: #222; border-radius: 8px; padding: 8px 14px;
    white-space: nowrap;
  }

  .status-text { font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
  .status-done    { color: #4caf50; }
  .status-partial { color: #f5c518; }
  .status-none    { color: #777; }

  .print-btn {
    width: 90px; height: 56px;
    font-size: 1.6rem;
    background: #2196f3;
    display: flex; align-items: center; justify-content: center;
  }
  .print-btn:hover { background: #1976d2; }
  .print-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .print-btn.done { background: #2e7d32; }

  #log {
    background: #0d0d0d;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 12px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 0.8rem;
    max-height: 220px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: #9ad39a;
  }

  .missing-note { font-size: 0.85rem; color: #f5c518; }
  .hidden { display: none; }
  .empty-msg { color: #666; text-align: center; padding: 40px; font-size: 1.1rem; }
</style>
</head>
<body>

  <h1>Merkingar — Sögun</h1>
  <div class="sub">Veldu verkefni, ýttu á prent-hnapp til að merkja og prenta miða.</div>

  <div class="card" id="searchCard">
    <label>Veldu verkefni (Tækifæri)</label>
    <input type="search" id="projectSearch" placeholder="Leita að verkefni…"
      style="width:100%;padding:8px 10px;border:1px solid #444;border-radius:6px;background:#1a1a1a;color:#fff;font-size:1rem;margin-bottom:6px;box-sizing:border-box;"
      oninput="filterProjectOptions()" />
    <select id="projectSelect">
      <option value="">Veldu verkefni…</option>
    </select>
  </div>

  <div class="card hidden" id="projectCard">
    <div style="font-size:1.2rem;font-weight:700;margin-bottom:4px;" id="projectName"></div>
    <div class="sub" id="projectStatus" style="margin-bottom:0;">Sæki Sögunarlisti færslur…</div>
  </div>

  <div class="card hidden" id="listCard">
    <div class="toolbar">
      <select id="efniSelect" style="max-width:260px;" onchange="onFilterChange()">
        <option value="">Öll efni</option>
      </select>
      <select id="skraSelect" style="max-width:260px;" onchange="onFilterChange()">
        <option value="">Allar skrár (CUTLST)</option>
      </select>
      <div class="filter-pill" id="filterPill" onclick="toggleFilter()">
        <span class="dot"></span>Sýna ólokið eingöngu
      </div>
      <div class="toolbar-right">
        <button onclick="loadProject(currentProjectId)">↺ Uppfæra</button>
      </div>
    </div>
    <div class="rows" id="rows"></div>
  </div>

  <div class="card hidden" id="logCard">
    <label>Log</label>
    <div id="log"></div>
  </div>

<script>
// ── CONFIGURATION ────────────────────────────────────────────────────────
const PROXY_URL = "/api/airtable";

const PROJECTS_TABLE     = "tbl4LMXlQjp66RFKI"; // Tækifæri 📣 (projects)
const SOGUNARLISTI_TABLE = "tblhdgyvTcBfP8kov"; // Sögunarlisti 🪚

const P_NAME_FIELD = "Heiti tækifæris / verkefnis";
const P_STADA_SOLU = "Staða í söluferli";
const P_STADA_SKIPULAG = "Staða í skipulagi";
const P_STADA_FRAM = "Staða í framleiðslu";
const P_UNNID = "Tækifæri unnið 🏆";

const S_PROJECT_LINK    = "Tækifæri 📣 (projects)";
const S_PARTUR          = "Partur";
const S_H               = "H";
const S_B               = "B";
const S_TH              = "Þ";
const S_M               = "M";
const S_EFNI_UNDIRSTADA = "Efni: (undirstaða)";
const S_ATHUGASEMD      = "Athugasemd";
const S_BAS             = "B.A.S.";
const S_LOKID           = "Lokið";
const S_SKURDARSKRA     = "Skurðarskrá";
// ─────────────────────────────────────────────────────────────────────────

let currentProjectId = null;
let allPieces = [];
let groups = [];
let filterUnfinished = false;
let selectedEfni = "";
let selectedSkra = "";

function log(msg) {
  const el = document.getElementById("log");
  document.getElementById("logCard").classList.remove("hidden");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function toNumber(v) {
  if (v === null || v === undefined) return 0;
  if (typeof v === "number") return v;
  const n = Number(String(v).replace(",", "."));
  return Number.isFinite(n) ? n : 0;
}

// Efni/Partur/file-name text is interpolated into innerHTML for the rows and
// filter dropdowns — escape it so a stray "<"/">" in Airtable text can't
// render as real HTML.
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

// printOneCycle polls every 1.5s for up to 20s — print-server.js already
// retries its own Airtable calls on 429 for the same reason, this mirrors
// it here instead of letting a rate-limit hit abort a print mid-run.
async function fetchWithRetry(url, options, maxRetries = 3) {
  for (let attempt = 0; ; attempt++) {
    const res = await fetch(url, options);
    if (res.status !== 429 || attempt >= maxRetries) return res;
    await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
  }
}

async function airtableFetch(table, params, recordId) {
  const url = new URL(PROXY_URL, window.location.origin);
  url.searchParams.set("path", recordId ? `${table}/${recordId}` : table);
  for (const [k, v] of Object.entries(params || {})) {
    if (Array.isArray(v)) v.forEach(x => url.searchParams.append(k, x));
    else if (v !== undefined) url.searchParams.set(k, v);
  }

  if (recordId) {
    const res = await fetchWithRetry(url.toString());
    if (!res.ok) throw new Error(`Airtable HTTP ${res.status}`);
    return res.json();
  }

  let records = [];
  let offset;
  do {
    if (offset) url.searchParams.set("offset", offset);
    const res = await fetchWithRetry(url.toString());
    if (!res.ok) throw new Error(`Airtable HTTP ${res.status}`);
    const data = await res.json();
    records = records.concat(data.records || []);
    offset = data.offset;
  } while (offset);
  return records;
}

async function patchSogunarlisti(recordId, fields) {
  const url = new URL(PROXY_URL, window.location.origin);
  url.searchParams.set("path", `${SOGUNARLISTI_TABLE}/${recordId}`);
  const res = await fetchWithRetry(url.toString(), {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ fields }),
  });
  if (!res.ok) throw new Error(`Airtable PATCH HTTP ${res.status}`);
  return res.json();
}

async function fetchEligibleProjects() {
  const formula = `AND(
    {${P_STADA_SOLU}} = "🏆 Tækifæri unnið",
    {${P_STADA_SKIPULAG}} = "Klárt til framleiðslu",
    {${P_STADA_FRAM}} != "Afhent (LOKIÐ ✅)"
  )`;
  return airtableFetch(PROJECTS_TABLE, {
    filterByFormula: formula,
    "fields[]": [P_NAME_FIELD],
    pageSize: 100,
  });
}

async function fetchProjectById(id) {
  return airtableFetch(PROJECTS_TABLE, {}, id);
}

async function fetchSogunarlistiForProject(projectName) {
  const escaped = projectName.replace(/"/g, '\\"');
  const formula = `FIND("${escaped}", ARRAYJOIN({${S_PROJECT_LINK}})) > 0`;
  return airtableFetch(SOGUNARLISTI_TABLE, {
    filterByFormula: formula,
    "fields[]": [
      S_PROJECT_LINK, S_PARTUR, S_H, S_B, S_TH, S_M,
      S_EFNI_UNDIRSTADA, S_ATHUGASEMD, S_BAS, S_LOKID, S_SKURDARSKRA,
    ],
    pageSize: 100,
  });
}

// ── GROUPING ─────────────────────────────────────────────────────────────
// Same Partur + same H + same B + same Þ = "the same sort and size" —
// collapses e.g. "Sk 1 Toppur 568x579" and "Sk 2 Toppur 568x579" into one
// row, regardless of which cabinet they belong to.
function groupPieces(pieces) {
  const map = new Map();
  const missingDims = [];
  for (const p of pieces) {
    if (p.b <= 0 || p.th <= 0) { missingDims.push(p); continue; }
    // Material is part of the key too, not just Partur+size — otherwise two
    // genuinely different materials that happen to share the same part name,
    // size, and thickness would silently merge into one row (each physical
    // label still prints correctly since print-server pulls material fresh
    // per record, but the aggregated row would misleadingly combine two
    // batches the operator would want to treat separately).
    const key = `${p.partur}|${p.h}|${p.b}|${p.th}|${p.efni}`;
    if (!map.has(key)) {
      map.set(key, { partur: p.partur, h: p.h, b: p.b, th: p.th, efni: p.efni, records: [] });
    }
    map.get(key).records.push(p);
  }
  return { groups: [...map.values()], missingDims };
}

// Copies-printed-so-far per record, keyed by record id. Airtable only ever
// stores the final Lokið flag, not "2 of 3 copies done" — that count lives
// in print-server.js's local counts.json — so this can only reflect progress
// actively driven through this tool in the current session; anything not
// yet touched here shows 0 until it's fully Lokið.
let printProgress = {};

function recordDoneQty(r) {
  if (r.lokid) return r.m;
  return printProgress[r.id] || 0;
}

function groupProgress(g) {
  const total = g.records.reduce((s, r) => s + r.m, 0);
  const done = g.records.reduce((s, r) => s + recordDoneQty(r), 0);
  return { done, total };
}

function groupStatus(g) {
  const { done, total } = groupProgress(g);
  if (done <= 0) return "none";
  if (done >= total) return "done";
  return "partial";
}

function groupQty(g) {
  return g.records.reduce((s, r) => s + r.m, 0);
}

// ── PRINT TRIGGER ────────────────────────────────────────────────────────
// Drives exactly ONE print cycle for a record: check B.A.S., wait for the
// shop's print-server.js to print one label and clear it (or set Lokið if
// that was the last copy), then stop. This deliberately does NOT loop to
// auto-finish a multi-copy piece — an earlier version re-checked B.A.S. in a
// loop until Lokið, which interacted badly with print-server's own 3s poll
// cadence and caused a runaway flood of duplicate prints on a real qty-8
// piece (confirmed live). One press now means exactly one print action;
// pieces with qty > 1 need one press per copy, same as the original
// checkbox-in-Airtable workflow.
async function printOneCycle(id) {
  const POLL_MS = 1500;
  const CYCLE_TIMEOUT_MS = 20000;

  await patchSogunarlisti(id, { [S_BAS]: true });
  const cycleStart = Date.now();

  while (Date.now() - cycleStart < CYCLE_TIMEOUT_MS) {
    await sleep(POLL_MS);
    const rec = await airtableFetch(SOGUNARLISTI_TABLE, {}, id);
    if (rec.fields[S_LOKID]) return { lokid: true };
    if (!rec.fields[S_BAS]) return { lokid: false }; // one copy printed, more may remain
  }

  // Timed out — B.A.S. never flipped back (print server likely isn't
  // running). Clear it ourselves so it doesn't sit checked and fire an
  // unexpected print later once the server comes back online.
  await patchSogunarlisti(id, { [S_BAS]: false }).catch(() => {});
  throw new Error("Prentþjónn svarar ekki (tímamörk náð) — er hann í gangi á gólfstölvunni?");
}

// Only one group can print at a time anyway (one physical printer), but
// nothing stopped clicking a second group's button while the first was still
// running — both printGroup() loops would race, PATCHing/polling B.A.S.
// concurrently. isPrinting blocks that: renderRows() disables every print
// button while it's true, not just the one that was clicked.
let isPrinting = false;

async function printGroup(groupKey) {
  if (isPrinting) return;
  const g = groups.find(x => x.key === groupKey);
  if (!g) return;
  isPrinting = true;
  renderRows();

  try {
    // One press = one print cycle per pending underlying record in this
    // group (bounded by how many distinct records it has) — not a repeat
    // loop per record. A qty>1 piece needs one press per remaining copy.
    const pending = g.records.filter(r => !r.lokid);
    for (const r of pending) {
      const roomLabel = r.athugasemd || r.id;
      try {
        log(`🖨️  Prenta: ${g.partur} ${g.h}×${g.b} — ${roomLabel}`);
        const result = await printOneCycle(r.id);
        if (result.lokid) {
          r.lokid = true;
          delete printProgress[r.id];
          log(`✅ Lokið: ${g.partur} — ${roomLabel}`);
        } else {
          printProgress[r.id] = (printProgress[r.id] || 0) + 1;
          log(`   ${printProgress[r.id]}/${r.m} prentað (${roomLabel}) — ýttu aftur fyrir næsta eintak`);
        }
        renderRows();
      } catch (e) {
        log(`❌ Villa (${roomLabel}): ${e.message}`);
        return; // stop the group here rather than pushing on after a failure
      }
    }
  } finally {
    isPrinting = false;
    renderRows();
  }
}

// ── LOAD / RENDER ────────────────────────────────────────────────────────
async function loadProject(projectId) {
  currentProjectId = projectId;
  document.getElementById("searchCard").classList.add("hidden");
  document.getElementById("projectCard").classList.remove("hidden");
  document.getElementById("listCard").classList.add("hidden");
  document.getElementById("projectStatus").textContent = "Sæki gögn…";

  const project = await fetchProjectById(projectId);
  const projectName = project.fields[P_NAME_FIELD] || project.id;
  document.getElementById("projectName").textContent = projectName;

  const rows = await fetchSogunarlistiForProject(projectName);

  allPieces = rows
    .filter(r => (r.fields[S_PROJECT_LINK] || []).includes(projectId))
    .map(r => ({
      id: r.id,
      partur: String(r.fields[S_PARTUR] || "").trim(),
      h: toNumber(r.fields[S_H]),
      b: toNumber(r.fields[S_B]),
      th: toNumber(r.fields[S_TH]),
      m: toNumber(r.fields[S_M]) || 1,
      efni: r.fields[S_EFNI_UNDIRSTADA] || "",
      athugasemd: String(r.fields[S_ATHUGASEMD] || "").trim(),
      lokid: !!r.fields[S_LOKID],
      skra: String(r.fields[S_SKURDARSKRA] || "").trim(),
    }));

  populateFilterDropdowns();
  document.getElementById("listCard").classList.remove("hidden");
  rebuildGroups();
}

// Materials and CUTLST files seen across the whole project — independent of
// the current filter selection, so switching one filter doesn't hide options
// in the other.
function populateFilterDropdowns() {
  const efnis = [...new Set(allPieces.map(p => p.efni).filter(Boolean))].sort();
  const skrar = [...new Set(allPieces.map(p => p.skra).filter(Boolean))].sort();

  const efniSelect = document.getElementById("efniSelect");
  const prevEfni = efniSelect.value;
  efniSelect.innerHTML = '<option value="">Öll efni</option>' +
    efnis.map(e => `<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join("");
  efniSelect.value = efnis.includes(prevEfni) ? prevEfni : "";

  const skraSelect = document.getElementById("skraSelect");
  const prevSkra = skraSelect.value;
  skraSelect.innerHTML = '<option value="">Allar skrár (CUTLST)</option>' +
    skrar.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("") +
    (allPieces.some(p => !p.skra) ? '<option value="__none__">Ekki í neinni skrá enn</option>' : "");
  skraSelect.value = (skrar.includes(prevSkra) || prevSkra === "__none__") ? prevSkra : "";
}

function onFilterChange() {
  selectedEfni = document.getElementById("efniSelect").value;
  selectedSkra = document.getElementById("skraSelect").value;
  rebuildGroups();
}

// Re-derives groups from allPieces + the current Efni/Skrá filters. Filtering
// by Skrá happens BEFORE grouping, not after — a group can straddle two
// CUTLST files (the 22-line cap can split one size across files), so
// filtering to one file has to narrow which underlying pieces count, not
// just hide groups that don't match.
function rebuildGroups() {
  let pieces = allPieces;
  if (selectedEfni) pieces = pieces.filter(p => p.efni === selectedEfni);
  if (selectedSkra === "__none__") pieces = pieces.filter(p => !p.skra);
  else if (selectedSkra) pieces = pieces.filter(p => p.skra === selectedSkra);

  const { groups: grouped, missingDims } = groupPieces(pieces);
  groups = grouped.map((g, i) => ({ ...g, key: String(i) }));

  document.getElementById("projectStatus").textContent =
    `${pieces.length} línur sýndar (af ${allPieces.length}), ${groups.length} hópar` +
    (missingDims.length ? ` — ${missingDims.length} línur vantar mál, sleppt` : "");

  renderRows();
}

function toggleFilter() {
  filterUnfinished = !filterUnfinished;
  document.getElementById("filterPill").classList.toggle("active", filterUnfinished);
  renderRows();
}

function renderRows() {
  const container = document.getElementById("rows");
  container.innerHTML = "";

  const visible = filterUnfinished ? groups.filter(g => groupStatus(g) !== "done") : groups;

  if (!visible.length) {
    container.innerHTML = `<div class="empty-msg">${filterUnfinished ? "Allt lokið 🎉" : "Engar færslur fundust."}</div>`;
    return;
  }

  // Largest pieces first — matches how the saw worker naturally thinks about
  // what's coming up (big panels before small trim pieces).
  const sorted = [...visible].sort((a, b) => (b.h * b.b) - (a.h * a.b));

  for (const g of sorted) {
    const status = groupStatus(g);
    const qty = groupQty(g);
    const { done: doneQty, total: totalQty } = groupProgress(g);
    const div = document.createElement("div");
    div.className = `row ${status}`;
    const statusText = `${doneQty}/${totalQty} prentað`;
    const statusClass = status === "done" ? "status-done" : status === "partial" ? "status-partial" : "status-none";

    const disabled = status === 'done' || isPrinting;
    const cabinets = [...new Set(g.records.map(r => r.athugasemd).filter(Boolean))].join(", ");
    div.innerHTML = `
      <div class="row-main">
        <div class="partur">${escapeHtml(g.partur)}</div>
        <div class="meta">${g.h}×${g.b}×${g.th}mm — ${escapeHtml(g.efni)}</div>
      </div>
      <div class="cabinets" title="${escapeHtml(cabinets)}">${escapeHtml(cabinets)}</div>
      <div class="qty-badge">×${qty}</div>
      <div class="status-text ${statusClass}">${statusText}</div>
      <button class="print-btn ${status === 'done' ? 'done' : ''}" id="btn-${g.key}"
        ${disabled ? 'disabled' : ''}
        onclick="printGroup('${g.key}')">${status === 'done' ? '✓' : '🖨️'}</button>
    `;
    container.appendChild(div);
  }
}

document.getElementById("projectSelect").addEventListener("change", (e) => {
  if (e.target.value) loadProject(e.target.value);
});

function filterProjectOptions() {
  const q = document.getElementById("projectSearch").value.toLowerCase();
  const select = document.getElementById("projectSelect");
  for (const opt of select.options) {
    opt.hidden = q && !opt.textContent.toLowerCase().includes(q);
  }
  // Auto-select if exactly one option matches
  const visible = Array.from(select.options).filter(o => !o.hidden && o.value);
  if (visible.length === 1) {
    select.value = visible[0].value;
    loadProject(visible[0].value);
  }
}

async function populateProjectDropdown() {
  const select = document.getElementById("projectSelect");
  const records = await fetchEligibleProjects();
  records.sort((a, b) =>
    (a.fields[P_NAME_FIELD] || "").localeCompare(b.fields[P_NAME_FIELD] || "", "is")
  );
  select.innerHTML = '<option value="">— Veldu verkefni —</option>';
  for (const r of records) {
    const opt = document.createElement("option");
    opt.value = r.id;
    opt.textContent = r.fields[P_NAME_FIELD] || r.id;
    select.appendChild(opt);
  }
}

// Auto-load if opened from an Airtable button: labels.html?recordId=recXXXX
const params = new URLSearchParams(window.location.search);
const recordIdParam = params.get("recordId");
if (recordIdParam) {
  loadProject(recordIdParam);
} else {
  populateProjectDropdown();
}
</script>
